<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doon — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  :root{--i:#1a1a18;--i2:#3a3a36;--i3:#6b6b64;--i4:#9b9b92;--bd:#e4e4de;--bd2:#cecec6;--bg:#f8f7f4;--wh:#fff;--r:6px;--r2:10px;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--i);height:100vh;display:flex;}
  a{color:inherit;text-decoration:none;}

  .split{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;width:100%;}

  /* Left Panel */
  .left{background:var(--i);padding:60px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;}
  .left::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;}
  .left-logo{font-family:'Fraunces',serif;font-size:28px;font-weight:700;color:#fff;letter-spacing:-.5px;position:relative;z-index:1;}
  .left-body{position:relative;z-index:1;}
  .left-kicker{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:16px;}
  .left-title{font-family:'Fraunces',serif;font-size:46px;font-weight:700;color:#fff;letter-spacing:-2px;line-height:1.05;margin-bottom:20px;}
  .left-sub{font-size:15px;color:rgba(255,255,255,.55);line-height:1.7;max-width:360px;}
  .left-provs{display:flex;gap:8px;flex-wrap:wrap;position:relative;z-index:1;}
  .left-prov{font-size:12px;color:rgba(255,255,255,.35);padding:4px 14px;border:1px solid rgba(255,255,255,.1);border-radius:100px;}

  /* Right Panel */
  .right{background:#fff;padding:80px;display:flex;flex-direction:column;justify-content:center;border-left:1px solid var(--bd);}
  .back-link{font-size:13px;color:var(--i3);margin-bottom:40px;display:inline-flex;align-items:center;gap:5px;}
  .form-title{font-family:'Fraunces',serif;font-size:32px;font-weight:700;letter-spacing:-1px;color:var(--i);margin-bottom:6px;}
  .form-sub{font-size:14px;color:var(--i3);margin-bottom:36px;}
  .form-sub a{color:var(--i);font-weight:600;border-bottom:1px solid var(--bd2);}

  .field{margin-bottom:20px;}
  .field label{display:block;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--i4);margin-bottom:6px;}
  .field input{width:100%;max-width:360px;padding:11px 14px;border:1px solid var(--bd);border-radius:var(--r2);background:var(--bg);font-size:14px;color:var(--i);font-family:inherit;outline:none;}
  .field input:focus{border-color:var(--i);background:#fff;}

  .forgot{display:block;font-size:12px;color:var(--i4);margin-top:6px;max-width:360px;text-align:right;}

  .btn-primary{display:inline-flex;align-items:center;justify-content:center;padding:12px 32px;background:var(--i);color:#fff;font-size:14px;font-weight:600;border:none;border-radius:100px;cursor:pointer;font-family:inherit;margin-top:8px;}
  .btn-secondary{display:inline-flex;align-items:center;justify-content:center;padding:12px 28px;background:transparent;color:var(--i2);font-size:14px;font-weight:500;border:1px solid var(--bd2);border-radius:100px;cursor:pointer;font-family:inherit;margin-top:8px;margin-left:8px;}

  .divider{display:flex;align-items:center;gap:12px;max-width:360px;margin:24px 0;}
  .divider-line{flex:1;height:1px;background:var(--bd);}
  .divider span{font-size:12px;color:var(--i4);}
</style>
</head>
<body>
<div class="split">

  <!-- Left -->
  <div class="left">
    <div class="left-logo">doon.</div>
    <div class="left-body">
      <div class="left-kicker">Welcome back</div>
      <h1 class="left-title">Welcome back to<br>CALABARZON</h1>
      <p class="left-sub">Sign in to access recommendations, saved destinations, and trip planning.</p>
    </div>
    <div class="left-provs">
      <span class="left-prov">Batangas</span>
      <span class="left-prov">Laguna</span>
      <span class="left-prov">Cavite</span>
      <span class="left-prov">Rizal</span>
      <span class="left-prov">Quezon</span>
    </div>
  </div>

  <!-- Right -->
  <div class="right">
    <a class="back-link" href="#">← Back to home</a>
    <h1 class="form-title">Welcome back</h1>
    <p class="form-sub">Don't have an account? <a href="#">Create one</a></p>

    <form>
      <div class="field">
        <label>Email Address</label>
        <input type="email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" placeholder="••••••••">
        <a class="forgot" href="#">Forgot password?</a>
      </div>
      <div>
        <button class="btn-primary" type="submit">Sign In</button>
        <a class="btn-secondary" href="#">Create an account</a>
      </div>
    </form>
  </div>

</div>
</body>
</html>
